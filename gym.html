<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario Registro Gimnasio</title>
    <link rel="stylesheet" href="gym.css">
</head>
<body>

<div class="contenedor">
    <h1>FORMULARIO DE REGISTRO</h1>
    <h2>NOMBRE DEL GIMNASIO</h2>

    <form>
        <label>Nombre</label>
        <input type="text">

        <label>Género</label>
        <div class="radio">
            <label><input type="radio" name="genero"> Masculino</label>
            <label><input type="radio" name="genero"> Femenino</label>
        </div>

        <label>Edad</label>
        <input type="number">

        <label>Fecha de Nacimiento</label>
        <input type="date">

        <label>Dirección</label>
        <input type="text">

        <label>Ciudad</label>
        <input type="text">

        <label>Número de Teléfono</label>
        <input type="tel">

        <label>Código Postal</label>
        <input type="text">

        <label>Correo Electrónico</label>
        <input type="email">

        <button>Registrarse</button>
    </form>
</div>

<footer class="footer">
   <p>© 2026 FORMULARIO DE GIMNASIO</p>
</footer>

</body>
</html>
