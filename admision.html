<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Admisión</title>
    <link rel="stylesheet" href="admision.css">
</head>
<body>

<div class="contenedor">
    <h1>FORMULARIO DE ADMISIÓN</h1>

    <form>
        <h3>DATOS PERSONALES</h3>

        <label>Nombre y Apellidos</label>
        <input type="text">

        <div class="fila">
            <div>
                <label>Fecha de Nacimiento</label>
                <input type="date">
            </div>
            <div>
                <label>Sexo</label>
                <select>
                    <option>Masculino</option>
                    <option>Femenino</option>
                </select>
            </div>
        </div>

        <label>Número de Teléfono</label>
        <input type="tel">

        <label>Dirección</label>
        <input type="text">

        <div class="fila">
            <div>
                <label>Ciudad</label>
                <input type="text">
            </div>
            <div>
                <label>Región</label>
                <input type="text">
            </div>
        </div>

        <div class="fila">
            <div>
                <label>Código Postal</label>
                <input type="text">
            </div>
            <div>
                <label>País</label>
                <input type="text">
            </div>
        </div>

        <label>Correo Electrónico</label>
        <input type="email">

        <button>Enviar Solicitud</button>
    </form>
</div>

<footer class="footer">
   <p>© 2026 FORMULARIO DE ADMISIÓN</p>
</footer>

</body>
</html>
