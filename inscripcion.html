<!DOCTYPE html>
<html lang="es">
<head class="header">
   <h1>FORMULARIO DE INSCRIPCIÓN</h1>
   <link rel="stylesheet" href="inscripcion.css">
   <img src="assets/img/logo.png" class="logo">
</head>

<body>

<div class="contenedor">

    <form>
        <label>Solicitud de ingreso a:</label>
        <input type="text">

        <label>Director/Presidente:</label>
        <input type="text">

        <label>Tipo de Afiliación:</label>
        <div class="radio-group">
            <label><input type="radio" name="afiliacion"> Bronce</label>
            <label><input type="radio" name="afiliacion"> Plata</label>
            <label><input type="radio" name="afiliacion"> Oro</label>
        </div>

        <label>Nombre de Pila:</label>
        <input type="text">

        <label>Dirección:</label>
        <input type="text">

        <div class="fila">
            <div>
                <label>Fecha de Nacimiento:</label>
                <input type="date">
            </div>
            <div>
                <label>Nacionalidad:</label>
                <input type="text">
            </div>
        </div>

        <div class="fila">
            <div>
                <label>Sexo:</label>
                <select>
                    <option>Masculino</option>
                    <option>Femenino</option>
                </select>
            </div>
            <div>
                <label>Ciudad/País:</label>
                <input type="text">
            </div>
        </div>

        <label>Correo Electrónico:</label>
        <input type="email">

        <div class="fila">
            <div>
                <label>Permiso de Conducir:</label>
                <input type="text">
            </div>
            <div>
                <label>Otro Número de Tarjeta:</label>
                <input type="text">
            </div>
        </div>

        <div class="firma">
            <label>Firma / Fecha:</label>
            <input type="text">
        </div>

        <button type="submit">Enviar</button>
    </form>
</div>


<footer class="footer">

</html>
